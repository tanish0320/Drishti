<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar as defined in JSON -->
<header class="bg-surface border-b-2 border-outline flex justify-between items-center w-full px-margin-mobile min-h-[72px] sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">visibility</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-primary uppercase tracking-tighter">DRISHTI</h1>
</div>
<button aria-label="Settings" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-primary-container transition-all">
<span class="material-symbols-outlined text-on-surface">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col p-margin-mobile gap-stack-gap pb-24">
<!-- Current Mode Pill -->
<div class="flex justify-center">
<div class="bg-secondary-container text-on-secondary-container px-6 py-3 rounded-full flex items-center gap-2 border-2 border-secondary font-bold shadow-sm">
<span class="w-3 h-3 bg-secondary rounded-full animate-pulse"></span>
<span class="font-label-lg text-label-lg">WALK MODE ACTIVE</span>
</div>
</div>
<!-- Camera Preview Area (Bento Grid Style for Layout Balance) -->
<div class="relative w-full aspect-square md:aspect-video rounded-xl border-4 border-on-background overflow-hidden bg-surface-container-highest shadow-xl">
<img class="w-full h-full object-cover opacity-90" data-alt="A wide-angle first-person view from a head-mounted camera showing a sunny city sidewalk. The image has high clarity and high contrast, with visible guidance markers like a digital blue line on the ground and bright yellow bounding boxes around pedestrians and obstacles. The lighting is bright and clear, emphasizing safety and path-finding in a modern urban environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDy42sSIzn-fmtcb3Yj9oxjH3I8O3No4nUWMG0O2Gjyi8WFuxAb0ezqxICvltjq5-Pxym-My1bIX1zwEcadvsNQK3G9t4qRMXn9VBXcEX6Qm9E8mrP_Yne6ZtF_HTJ2UUrABLiaujLPSBpbqB9a4GV6BESh7X1q__nMHZuhd3EiMGi6ls_yAUoaz-ppWpdEHRY4RNStEe8pK8wSQi6mvR3sO5rHHB9y7klxGS1XUNBhwt-LPtF8nMtg5XxQ7AqANayM523C3bdBNBA"/>
<!-- Scanning Overlay -->
<div class="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
<div class="w-full h-1 bg-primary/30 absolute animate-bounce top-1/4"></div>
<div class="w-full h-1 bg-primary/30 absolute animate-bounce top-1/2"></div>
<div class="w-full h-1 bg-primary/30 absolute animate-bounce top-3/4"></div>
<div class="bg-on-background/80 text-white px-4 py-2 rounded font-bold text-label-md">LIVE FEED</div>
</div>
</div>
<!-- Mode Selection Grid (Massive Buttons) -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-stack-gap">
<!-- WALK Button -->
<button aria-label="Walk Mode" class="group flex flex-col items-center justify-center bg-primary text-white py-8 rounded-xl border-4 border-on-primary-fixed-variant shadow-lg active:scale-95 transition-all min-h-[140px]">
<span class="material-symbols-outlined large-icon mb-2">directions_walk</span>
<span class="font-headline-sm text-headline-sm uppercase">WALK</span>
</button>
<!-- READ Button -->
<button aria-label="Read Mode" class="group flex flex-col items-center justify-center bg-surface-container border-4 border-outline text-on-surface py-8 rounded-xl shadow-lg active:scale-95 transition-all min-h-[140px]">
<span class="material-symbols-outlined large-icon mb-2">menu_book</span>
<span class="font-headline-sm text-headline-sm uppercase text-on-surface">READ</span>
</button>
<!-- AUTO Button -->
<button aria-label="Automatic Mode" class="group flex flex-col items-center justify-center bg-surface-container border-4 border-outline text-on-surface py-8 rounded-xl shadow-lg active:scale-95 transition-all min-h-[140px]">
<span class="material-symbols-outlined large-icon mb-2">smart_toy</span>
<span class="font-headline-sm text-headline-sm uppercase text-on-surface">AUTO</span>
</button>
</div>
<!-- Functional Bottom Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap mt-4">
<!-- Settings Large Button -->
<button aria-label="Open System Settings" class="flex items-center justify-center gap-4 bg-surface-variant border-4 border-outline text-on-background py-6 rounded-xl min-h-touch-target-min font-bold active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-lg text-label-lg uppercase">SYSTEM SETTINGS</span>
</button>
<!-- EMERGENCY STOP -->
<button aria-label="Emergency Stop System" class="flex items-center justify-center gap-4 bg-error text-on-error py-6 rounded-xl min-h-touch-target-min font-black border-4 border-on-error-container active:scale-95 transition-transform">
<span class="material-symbols-outlined large-icon" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-headline-sm text-headline-sm uppercase">EMERGENCY STOP</span>
</button>
</div>
</main>
<!-- Footer as defined in JSON -->
<footer class="bg-secondary border-t-4 border-secondary-container fixed bottom-0 left-0 w-full min-h-[64px] flex items-center justify-center px-margin-mobile z-50">
<div class="flex items-center gap-4">
<span class="font-label-lg text-label-lg font-bold text-on-secondary">SYSTEM STATUS: CAMERA READY</span>
<div class="w-2 h-2 bg-secondary-container rounded-full animate-pulse"></div>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(40); // Haptic feedback for accessibility
                }
            });
            
            button.addEventListener('click', function() {
                // Announcements for screen readers can be added here
                const text = this.innerText || this.getAttribute('aria-label');
                console.log('Action triggered:', text);
            });
        });

        // Atmospheric scan animation logic
        const scanLine = document.createElement('div');
        // Any specific JS logic for assistive technology focus can be added here
    </script>
