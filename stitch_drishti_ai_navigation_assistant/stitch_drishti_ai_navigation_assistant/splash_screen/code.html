<!DOCTYPE html>

<html lang="en"><head>

                    "surface-container-lowest": "#ffffff",

                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "secondary": "#1b6d24",
                    "outline": "#717783",
                    "surface-container-low": "#f6f3f2",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005312",

                    "on-secondary-container": "#217128",
                    "on-secondary": "#ffffff",

                    "outline-variant": "#c1c6d4",
                    "on-error": "#ffffff",

                    "primary": "#005dac",
                    "on-primary-fixed": "#001c3a",
                    "surface-tint": "#005faf",
                    "primary-fixed-dim": "#a5c8ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            display: inline-block;
            vertical-align: middle;
        }
        /* Custom accessibility focus ring */
        :focus {
            outline: none !important;
            box-shadow: 0 0 0 4px #005dac !important;
        }
        /* Smooth entrance for the logo */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .animate-logo {
            animation: pulse-soft 3s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- Splash Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile text-center relative">
<!-- Abstract Background element for depth (Low-contrast outline principle) -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-5">
<span class="material-symbols-outlined text-[600px]">visibility</span>
</div>
<!-- Logo Container -->
<div class="mb-stack-gap animate-logo z-10">
<div class="w-[160px] h-[160px] rounded-full bg-primary-container flex items-center justify-center border-[2px] border-on-background shadow-none">
<span class="material-symbols-outlined text-[96px] text-on-primary-container" data-icon="visibility" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
</div>
<!-- Brand Identity -->
<div class="space-y-4 z-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background tracking-tighter uppercase font-black">
                DRISHTI
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto leading-relaxed">
                Helping you navigate with confidence
            </p>
</div>
</main>
<!-- Footer Action Area -->
<footer class="w-full px-margin-mobile pb-12 pt-6 flex flex-col items-center gap-6 z-20">
<!-- Primary Start Button: High Contrast Blue, 80dp height -->
<button aria-label="Start Navigation" class="w-full max-w-[400px] h-[80px] bg-primary text-on-primary rounded-lg font-headline-sm text-headline-sm flex items-center justify-center gap-4 active:scale-95 transition-transform duration-100" id="start-button">
<span class="uppercase tracking-widest">START</span>
<span class="material-symbols-outlined text-4xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- System Readiness Indicator -->
<div aria-live="polite" class="flex items-center gap-3 py-2 px-4 border-[2px] border-secondary bg-secondary-container/10 rounded-full">
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md text-on-secondary-container font-bold uppercase tracking-tight">System Ready</span>
</div>
</footer>
<!-- Bottom Status Bar (Shared Component Style) -->
<div class="fixed bottom-0 left-0 w-full min-h-[48px] bg-secondary flex items-center justify-center border-t-4 border-secondary-container">
<span class="font-label-lg text-label-lg font-bold text-on-secondary uppercase">
            SYSTEM STATUS: CAMERA READY
        </span>
</div>
<!-- Micro-interaction Script -->
<script>
        document.getElementById('start-button').addEventListener('click', () => {
            // Provide haptic-like visual feedback or sound if desired
            const btn = document.getElementById('start-button');
            btn.innerHTML = `
                <span class="material-symbols-outlined animate-spin text-4xl">autorenew</span>
                <span class="uppercase tracking-widest">LOADING...</span>
            `;
            
            // Simulation of transition
            setTimeout(() => {
                // In a real app, this would route to the main dashboard
                console.log('Transitioning to Walk Mode...');
            }, 800);
        });

        // Announce readiness to screen readers after a brief delay
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const liveRegion = document.querySelector('[aria-live="polite"]');
                if (liveRegion) {
                    // Force re-announcement
                    const text = liveRegion.innerText;
                    liveRegion.innerText = '';
                    setTimeout(() => liveRegion.innerText = text, 100);
                }
            }, 1000);
        });
    </script>
</body></html>
