<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Drishti Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#004786",
                    "surface-container-highest": "#e5e2e1",
                    "secondary-container": "#a0f399",
                    "tertiary": "#9a4300",
                    "secondary-fixed-dim": "#88d982",
                    "on-error-container": "#93000a",
                    "surface-dim": "#dcd9d9",
                    "secondary-fixed": "#a3f69c",
                    "primary-container": "#1976d2",
                    "on-tertiary": "#ffffff",
                    "background": "#fcf9f8",
                    "on-tertiary-fixed-variant": "#773200",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#fffdff",
                    "inverse-primary": "#a5c8ff",
                    "on-surface-variant": "#414752",
                    "tertiary-container": "#c05600",
                    "surface-bright": "#fcf9f8",
                    "surface-container": "#f0eded",
                    "on-background": "#1b1c1c",
                    "on-tertiary-container": "#fffdff",
                    "inverse-on-surface": "#f3f0ef",
                    "surface": "#fcf9f8",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "secondary": "#1b6d24",
                    "outline": "#717783",
                    "surface-container-low": "#f6f3f2",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005312",
                    "tertiary-fixed": "#ffdbca",
                    "on-secondary-container": "#217128",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#303030",
                    "primary-fixed": "#d4e3ff",
                    "outline-variant": "#c1c6d4",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#ffb68f",
                    "primary": "#005dac",
                    "on-primary-fixed": "#001c3a",
                    "surface-tint": "#005faf",
                    "primary-fixed-dim": "#a5c8ff",
                    "on-surface": "#1b1c1c",
                    "surface-variant": "#e5e2e1",
                    "on-secondary-fixed": "#002204",
                    "on-tertiary-fixed": "#331200",
                    "surface-container-high": "#eae7e7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "20px",
                    "margin-tablet": "48px",
                    "touch-target-min": "64dp",
                    "gutter": "24px",
                    "margin-mobile": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Atkinson Hyperlegible Next"],
                    "label-md": ["Atkinson Hyperlegible Next"],
                    "headline-sm": ["Atkinson Hyperlegible Next"],
                    "headline-lg-mobile": ["Atkinson Hyperlegible Next"],
                    "label-lg": ["Atkinson Hyperlegible Next"],
                    "headline-md": ["Atkinson Hyperlegible Next"],
                    "body-lg": ["Atkinson Hyperlegible Next"],
                    "body-md": ["Atkinson Hyperlegible Next"]
            },
            "fontSize": {
                    "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-md": ["18px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "800"}],
                    "label-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "600"}],
                    "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "body-lg": ["22px", {"lineHeight": "32px", "fontWeight": "400"}],
                    "body-md": ["20px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            font-size: 32px;
        }
        .touch-target {
            min-height: 80px;
        }
        .active-selection {
            outline: 4px solid #005dac;
            background-color: #d4e3ff;
        }
        body {
            font-family: 'Atkinson Hyperlegible Next', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 left-0 bg-surface dark:bg-on-background border-b-2 border-outline dark:border-outline-variant flex justify-between items-center px-margin-mobile min-h-[72px] sticky z-50">
<div class="flex items-center gap-4">
<button aria-label="Go Back" class="material-symbols-outlined text-primary dark:text-primary-fixed p-2 rounded-full hover:bg-primary-container transition-all active:ring-4 active:ring-primary">
                arrow_back
            </button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile uppercase tracking-tighter font-black text-primary dark:text-primary-fixed">
                DRISHTI
            </h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex justify-center w-full px-margin-mobile py-8 pb-32">
<div class="w-full max-w-[800px] flex flex-col gap-stack-gap">
<h2 class="font-headline-sm text-headline-sm mb-2 text-on-surface">Preferences</h2>
<!-- Language Section -->
<section aria-labelledby="lang-heading" class="flex flex-col gap-4 p-4 border-2 border-outline rounded-xl bg-surface-container-lowest shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="language">language</span>
<h3 class="font-label-lg text-label-lg" id="lang-heading">Language</h3>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<button aria-pressed="true" class="touch-target border-2 border-outline rounded-lg flex items-center justify-center font-headline-sm text-headline-sm active-selection">
                        English
                    </button>
<button aria-pressed="false" class="touch-target border-2 border-outline rounded-lg flex items-center justify-center font-headline-sm text-headline-sm hover:bg-surface-container-low">
                        हिन्दी
                    </button>
</div>
</section>
<!-- Theme Section -->
<section aria-labelledby="theme-heading" class="flex flex-col gap-4 p-4 border-2 border-outline rounded-xl bg-surface-container-lowest shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="contrast">contrast</span>
<h3 class="font-label-lg text-label-lg" id="theme-heading">Theme</h3>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<button class="touch-target border-2 border-outline rounded-lg flex items-center justify-center gap-4 font-headline-sm text-headline-sm active-selection" id="theme-light" onclick="setTheme('light')">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span> Light
                    </button>
<button class="touch-target border-2 border-outline rounded-lg flex items-center justify-center gap-4 font-headline-sm text-headline-sm hover:bg-surface-container-low" id="theme-dark" onclick="setTheme('dark')">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span> Dark
                    </button>
</div>
</section>
<!-- Haptic Intensity Section -->
<section aria-labelledby="haptic-heading" class="flex flex-col gap-4 p-4 border-2 border-outline rounded-xl bg-surface-container-lowest shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="vibration">vibration</span>
<h3 class="font-label-lg text-label-lg" id="haptic-heading">Haptic Intensity</h3>
</div>
<div class="flex flex-col gap-3">
<button class="touch-target border-2 border-outline rounded-lg flex items-center justify-between px-8 font-headline-sm text-headline-sm hover:bg-surface-container-low">
                        Low
                        <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
<button class="touch-target border-2 border-outline rounded-lg flex items-center justify-between px-8 font-headline-sm text-headline-sm active-selection">
                        Medium
                        <span class="material-symbols-outlined" data-icon="radio_button_checked">radio_button_checked</span>
</button>
<button class="touch-target border-2 border-outline rounded-lg flex items-center justify-between px-8 font-headline-sm text-headline-sm hover:bg-surface-container-low">
                        High
                        <span class="material-symbols-outlined" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
</section>
<!-- Utility Buttons -->
<div class="flex flex-col gap-4">
<button class="touch-target bg-primary text-on-primary rounded-lg flex items-center justify-between px-8 font-headline-sm text-headline-sm transition-all active:scale-[0.98] active:ring-4 active:ring-primary-container">
                    Permissions
                    <span class="material-symbols-outlined" data-icon="security">security</span>
</button>
<button class="touch-target border-2 border-primary text-primary rounded-lg flex items-center justify-between px-8 font-headline-sm text-headline-sm bg-surface-container-lowest hover:bg-primary-fixed-dim transition-all active:scale-[0.98]">
                    About Drishti
                    <span class="material-symbols-outlined" data-icon="info">info</span>
</button>
</div>
<!-- Visual Separation Space -->
<div class="h-12"></div>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 left-0 w-full min-h-[64px] flex items-center justify-center px-margin-mobile bg-secondary dark:bg-on-secondary-fixed-variant border-t-4 border-secondary-container z-50">
<div class="flex flex-col items-center gap-1">
<p class="font-label-lg text-label-lg font-bold text-on-secondary uppercase tracking-widest">
                SYSTEM STATUS: CAMERA READY
            </p>
<div class="flex gap-4">
<span class="font-label-lg text-label-lg font-bold bg-secondary-container text-on-secondary-container px-4 py-1 rounded-full">
                    WALK MODE ACTIVE
                </span>
</div>
</div>
</footer>
<script>
        function setTheme(mode) {
            const html = document.documentElement;
            const lightBtn = document.getElementById('theme-light');
            const darkBtn = document.getElementById('theme-dark');

            if (mode === 'dark') {
                html.classList.add('dark');
                darkBtn.classList.add('active-selection');
                lightBtn.classList.remove('active-selection');
                lightBtn.classList.add('hover:bg-surface-container-low');
            } else {
                html.classList.remove('dark');
                lightBtn.classList.add('active-selection');
                darkBtn.classList.remove('active-selection');
                darkBtn.classList.add('hover:bg-surface-container-low');
            }
            
            // Trigger haptic feedback simulation
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        }

        // Initialize haptic feedback for all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(20);
                }
            });
        });
    </script>
</body></html>
